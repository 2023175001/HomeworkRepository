<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      th,
      td {
        text-align: center;
        padding: 2px;
      }

      img {
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>안녕하세요. 2023175001 강희수입니다.</h2>
      <p>
        다음은 제가 영화를 볼 때 자주 방문하는 웹페이지들 입니다. 해당 사이트를
        누르면 접속 가능합니다.
      </p>
      <ul>
        <li><a href="https://www.netflix.com/">Netflix</a></li>
        <li><a href="https://www.tving.com/">Tving</a></li>
        <li><a href="https://www.disneyplus.com/">Disney+</a></li>
      </ul>
    </header>
    <table border="1">
      <caption>
        표1. Top3 영화
      </caption>
      <thead>
        <tr>
          <th rowspan="2">순위</th>
          <th colspan="3">영화 정보</th>
        </tr>
        <tr>
          <th>제목</th>
          <th>포스터</th>
          <th>명대사</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>The Avengers</td>
          <td>
            <img
              src="the_avengers.jpg"
              width="140"
              height="200"
              alt="The Avengers poster"
            />
          </td>
          <td>Some assembly required.</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Frozen</td>
          <td>
            <img
              src="frozen.jpg"
              width="140"
              height="200"
              alt="Frozen poster"
            />
          </td>
          <td>Only the act of true love will thaw a frozen heart.</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Jurassic World</td>
          <td>
            <img
              src="jurassic_world.jpg"
              width="140"
              height="200"
              alt="Jurassic World poster"
            />
          </td>
          <td>The park is open.</td>
        </tr>
      </tbody>
    </table>

</html>
